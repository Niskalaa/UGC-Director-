name: Protect critical paths

on:
  pull_request:
    branches: ["main"]

jobs:
  prevent-deletes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block deletions of protected paths
        run: |
          set -e

          # Paths yang tidak boleh dihapus dari main
          PROTECTED_PATHS=(
            "api/"
            "internal/"
            "prompts/"
            "package.json"
          )

          git fetch origin "${{ github.base_ref }}" --depth=1

          # Ambil daftar file yang dihapus (status D) di PR
          DELETED_FILES=$(git diff --name-status "origin/${{ github.base_ref }}"...HEAD | awk '$1=="D"{print $2}')

          if [ -z "$DELETED_FILES" ]; then
            echo "No deletions detected."
            exit 0
          fi

          echo "Deleted files detected:"
          echo "$DELETED_FILES"

          FAILED=0

          # 1) blok package.json jika dihapus
          if echo "$DELETED_FILES" | grep -x "package.json" >/dev/null 2>&1; then
            echo "❌ Blocked: package.json is deleted"
            FAILED=1
          fi

          # 2) blok penghapusan apa pun di bawah folder yang diproteksi
          for p in "${PROTECTED_PATHS[@]}"; do
            # skip package.json karena sudah dicek exact match
            if [ "$p" = "package.json" ]; then
              continue
            fi

            if echo "$DELETED_FILES" | grep -E "^${p}" >/dev/null 2>&1; then
              echo "❌ Blocked: deletion under protected path: $p"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "This PR deletes protected paths. Restore them or change the PR."
            exit 1
          fi

          echo "✅ No protected deletions found."
